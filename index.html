<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title data-i18n="meta.title">VoltKompass — Wohnmobil-Beratung für Strom, Solar & Autarkie</title>
<meta name="description" data-i18n-attr="content:meta.description" content="Persönliche 1:1 Wohnmobil-Beratung. Kaufberatung, Solaranlagen, Stromversorgung, Autarkie. Kein Verkaufsdruck — nur ehrliche Orientierung." />
<meta name="theme-color" content="#0b1220" />
<link rel="alternate" hreflang="de" href="?lang=de" />
<link rel="alternate" hreflang="ru" href="?lang=ru" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#e6b200;
    --gold-hi:#ffe27a;
    --gold-lo:#8a6a00;
    --blue:#1d5f9f;
    --blue-hi:#6ab4f0;
    --blue-lo:#0b2f55;
    --ink:#0b1220;
    --ink-2:#111a2d;
    --ink-3:#17233d;
    --line:rgba(255,255,255,.08);
    --text:#e9eef7;
    --mute:#9aa7bf;
    --radius:18px;
    --maxw:1200px;
    --shadow:0 30px 80px -30px rgba(0,0,0,.6);
    --font:"Space Grotesk","Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font);
    background:var(--ink);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
    line-height:1.55;
  }
  img,svg{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;border:0;background:0}
  h1,h2,h3{font-family:var(--font);font-weight:700;letter-spacing:-.02em;line-height:1.05;margin:0}
  h2{font-size:clamp(32px,4.6vw,56px)}
  h3{font-size:clamp(20px,2vw,24px);letter-spacing:-.01em}
  p{margin:0}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold);
    padding:8px 14px;border:1px solid rgba(230,178,0,.35);border-radius:999px;
    background:rgba(230,178,0,.06);
  }
  .eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}

  /* ---------- NAV ---------- */
  .nav{
    position:sticky;top:0;z-index:50;
    backdrop-filter:saturate(140%) blur(14px);
    background:linear-gradient(to bottom,rgba(11,18,32,.85),rgba(11,18,32,.55));
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{font-family:var(--font);font-weight:700;font-size:22px;letter-spacing:-.02em}
  .brand .v{background:linear-gradient(to top,var(--gold-lo),var(--gold) 55%,var(--gold-hi));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .k{background:linear-gradient(to top,var(--blue-lo),var(--blue) 55%,var(--blue-hi));-webkit-background-clip:text;background-clip:text;color:transparent}
  .nav ul{display:flex;gap:34px;list-style:none;margin:0;padding:0}
  .nav ul a{font-size:14px;color:var(--mute);transition:color .2s}
  .nav ul a:hover{color:var(--text)}
  .nav .cta{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;background:var(--gold);color:#1a1200;font-weight:600;font-size:14px;transition:transform .2s}
  .nav .cta:hover{transform:translateY(-1px)}
  .lang-switch{
    display:inline-flex;align-items:center;gap:2px;
    margin-right:16px;
    border:1px solid var(--line);border-radius:999px;
    overflow:hidden;
  }
  .lang-switch button{
    padding:6px 12px;font-size:12px;font-weight:600;letter-spacing:.05em;
    color:var(--mute);background:transparent;transition:all .2s;
  }
  .lang-switch button.active{
    background:rgba(230,178,0,.15);color:var(--gold);
  }
  .lang-switch button:hover{color:var(--text)}
  @media (max-width:860px){.nav ul{display:none}}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:clamp(60px,10vw,120px) 0 clamp(80px,10vw,140px);
    overflow:hidden;
  }
  .hero::before{
    content:"";position:absolute;inset:-10% -10% auto -10%;height:80%;
    background:
      radial-gradient(60% 60% at 70% 30%,rgba(29,95,159,.35),transparent 60%),
      radial-gradient(50% 50% at 20% 80%,rgba(230,178,0,.18),transparent 60%);
    filter:blur(20px);
    pointer-events:none;
  }
  .hero-grid{
    position:relative;
    display:grid;grid-template-columns:1.05fr .95fr;gap:60px;align-items:center;
  }
  @media (max-width:960px){.hero-grid{grid-template-columns:1fr;gap:40px}}
  .hero h1{
    font-size:clamp(56px,9vw,120px);
    line-height:.92;letter-spacing:-.04em;font-weight:700;
    margin-bottom:24px;
  }
  .hero h1 .v{background:linear-gradient(to top,var(--gold-lo) 0%,var(--gold) 45%,var(--gold-hi) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.3))}
  .hero h1 .k{background:linear-gradient(to top,var(--blue-lo) 0%,var(--blue) 45%,var(--blue-hi) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.3))}
  .hero .claim{font-size:clamp(18px,1.5vw,21px);color:var(--mute);max-width:520px;margin:0 0 36px}
  .hero .claim b{color:var(--text);font-weight:600}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:16px 26px;border-radius:14px;font-weight:600;font-size:15px;transition:transform .2s,box-shadow .2s}
  .btn-primary{background:var(--gold);color:#1a1200;box-shadow:0 10px 30px -10px rgba(230,178,0,.5)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 40px -10px rgba(230,178,0,.6)}
  .btn-ghost{border:1px solid var(--line);color:var(--text)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn svg{width:16px;height:16px}

  .hero-meta{
    display:flex;gap:32px;margin-top:48px;padding-top:28px;border-top:1px solid var(--line);max-width:520px;
  }
  .hero-meta div{flex:1}
  .hero-meta b{display:block;font-size:28px;font-weight:700;color:var(--gold);line-height:1}
  .hero-meta span{display:block;margin-top:6px;font-size:13px;color:var(--mute)}

  /* ---------- KOMPASS ---------- */
  .compass-wrap{
    position:relative;aspect-ratio:1/1;width:100%;max-width:560px;margin-inline:auto;
  }
  .compass-wrap::before{
    content:"";position:absolute;inset:8%;border-radius:50%;
    background:radial-gradient(closest-side,rgba(230,178,0,.35),rgba(106,180,240,.15) 60%,transparent 75%);
    filter:blur(40px);
    animation:glow 3.6s ease-in-out infinite;
    pointer-events:none;
  }
  .compass-rotor{
    position:absolute;inset:0;
    animation:spin 80s linear infinite;
    will-change:transform;
    transform:translateZ(0);
    backface-visibility:hidden;
    transform-origin:50% 50%;
  }
  .compass{position:absolute;inset:0;width:100%;height:100%;display:block}
  .compass-letter{
    position:absolute;
    font-family:"Orbitron",sans-serif;font-weight:800;
    font-size:clamp(16px,2.8cqi,26px);
    color:#ffe27a;pointer-events:none;line-height:1;
    transform:translate(-50%,-50%);
  }
  .compass-wrap{container-type:inline-size}
  .cl-n{left:50%;top:12.4%}
  .cl-s{left:50%;top:87.6%}
  .cl-w{left:12.4%;top:50%}
  .cl-o{left:87.6%;top:50%}
  .bolt{
    position:absolute;inset:0;width:100%;height:100%;
  }
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes glow{
    0%,100%{opacity:.75}
    50%{opacity:1}
  }
  @media (prefers-reduced-motion:reduce){
    .compass-rotor{animation:none}
    .compass-wrap::before{animation:none}
  }

  /* ---------- SECTIONS ---------- */
  section{padding:clamp(80px,9vw,130px) 0;position:relative}
  .section-head{display:flex;align-items:end;justify-content:space-between;gap:40px;margin-bottom:60px;flex-wrap:wrap}
  .section-head p{color:var(--mute);max-width:420px;font-size:16px}
  .accent{background:linear-gradient(to top,var(--gold-lo),var(--gold) 55%,var(--gold-hi));-webkit-background-clip:text;background-clip:text;color:transparent}

  /* PROBLEM / STELL DIR VOR */
  .problem{background:linear-gradient(180deg,transparent,rgba(29,95,159,.06) 40%,transparent)}
  .problem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  @media (max-width:860px){.problem-grid{grid-template-columns:1fr}}
  .pain{
    padding:32px;border:1px solid var(--line);border-radius:var(--radius);
    background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));
    transition:border-color .3s,transform .3s;
  }
  .pain:hover{border-color:rgba(230,178,0,.4);transform:translateY(-4px)}
  .pain .num{font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.15em}
  .pain h3{margin:14px 0 10px}
  .pain p{color:var(--mute);font-size:15px}

  /* FACHBEREICHE */
  .areas{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media (max-width:960px){.areas{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:620px){.areas{grid-template-columns:1fr}}
  .area{
    position:relative;padding:34px;border-radius:var(--radius);
    background:linear-gradient(180deg,var(--ink-2),var(--ink-3));
    border:1px solid var(--line);
    overflow:hidden;isolation:isolate;
    transition:transform .35s cubic-bezier(.2,.8,.2,1),border-color .3s;
  }
  .area::after{
    content:"";position:absolute;inset:auto -30% -60% auto;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(230,178,0,.18),transparent 70%);
    z-index:-1;opacity:0;transition:opacity .4s;
  }
  .area:hover{transform:translateY(-6px);border-color:rgba(230,178,0,.4)}
  .area:hover::after{opacity:1}
  .area .ico{
    width:54px;height:54px;border-radius:14px;display:grid;place-items:center;
    background:rgba(230,178,0,.12);border:1px solid rgba(230,178,0,.3);
    color:var(--gold);margin-bottom:22px;
  }
  .area .ico svg{width:26px;height:26px}
  .area h3{margin-bottom:10px}
  .area p{color:var(--mute);font-size:15px}

  /* ABLAUF */
  .process{background:linear-gradient(180deg,transparent,rgba(230,178,0,.04))}
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
  @media (max-width:960px){.steps{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:520px){.steps{grid-template-columns:1fr}}
  .step{position:relative;padding:28px;border-radius:var(--radius);border:1px solid var(--line);background:rgba(255,255,255,.02)}
  .step .n{
    display:grid;place-items:center;width:44px;height:44px;border-radius:12px;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#1a1200;
    font-weight:700;font-size:18px;margin-bottom:18px;
    box-shadow:0 8px 20px -8px rgba(230,178,0,.6);
  }
  .step h3{margin-bottom:8px;font-size:18px}
  .step p{color:var(--mute);font-size:14px}

  /* PREISE */
  .pricing{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:900px;margin:0 auto}
  @media (max-width:760px){.pricing{grid-template-columns:1fr}}
  .plan{
    padding:44px 36px;border-radius:24px;border:1px solid var(--line);
    background:linear-gradient(180deg,var(--ink-2),var(--ink-3));
    position:relative;overflow:hidden;
  }
  .plan.featured{
    border-color:rgba(230,178,0,.4);
    background:linear-gradient(180deg,rgba(230,178,0,.08),var(--ink-3));
  }
  .plan.featured::before{
    content:attr(data-badge);position:absolute;top:20px;right:20px;
    font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
    background:var(--gold);color:#1a1200;padding:6px 12px;border-radius:999px;
  }
  .plan h3{font-size:15px;color:var(--mute);text-transform:uppercase;letter-spacing:.15em;font-weight:600}
  .plan .price{display:flex;align-items:baseline;gap:6px;margin:18px 0 8px}
  .plan .price b{font-size:64px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
  .plan .price span{color:var(--mute);font-size:16px}
  .plan .sub{color:var(--mute);font-size:14px;margin-bottom:30px}
  .plan ul{list-style:none;padding:0;margin:0 0 30px}
  .plan li{display:flex;gap:12px;padding:10px 0;font-size:15px;color:var(--text);border-top:1px solid var(--line)}
  .plan li:first-child{border-top:0}
  .plan li svg{flex:0 0 18px;width:18px;height:18px;color:var(--gold);margin-top:3px}
  .plan .btn{width:100%;justify-content:center}

  /* ÜBER MICH */
  .about{background:linear-gradient(180deg,transparent,rgba(29,95,159,.06))}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
  @media (max-width:860px){.about-grid{grid-template-columns:1fr;gap:40px}}
  .about h2{margin-bottom:24px}
  .about p{color:var(--mute);font-size:16px;margin-bottom:16px}
  .about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:36px}
  .stat b{display:block;font-size:40px;font-weight:700;color:var(--gold);letter-spacing:-.02em;line-height:1}
  .stat span{display:block;margin-top:8px;font-size:13px;color:var(--mute);text-transform:uppercase;letter-spacing:.1em}
  .about-visual{
    position:relative;aspect-ratio:4/5;border-radius:24px;overflow:hidden;
    border:1px solid var(--line);
    background:linear-gradient(180deg,var(--ink-2),var(--ink-3));
  }
  .about-visual img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .about-visual::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      linear-gradient(180deg,transparent 50%,rgba(11,18,32,.85) 100%),
      radial-gradient(circle at 20% 10%,rgba(230,178,0,.18),transparent 50%);
  }
  .about-visual figcaption{
    position:absolute;left:28px;right:28px;bottom:26px;z-index:1;
    font-size:14px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  }
  .about-visual figcaption b{display:block;color:var(--text);font-size:22px;letter-spacing:-.01em;text-transform:none;margin-bottom:4px}

  /* VIDEO FACADE */
  .video{padding-top:0}
  .video-box{
    position:relative;aspect-ratio:16/9;border-radius:24px;overflow:hidden;
    border:1px solid var(--line);cursor:pointer;
    background:#000;max-width:960px;margin:0 auto;
    box-shadow:0 40px 100px -40px rgba(0,0,0,.8);
  }
  .video-box img{width:100%;height:100%;object-fit:cover;opacity:.85;transition:opacity .3s,transform .6s}
  .video-box:hover img{opacity:1;transform:scale(1.03)}
  .video-box::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 40%,rgba(11,18,32,.6));
    pointer-events:none;
  }
  .video-play{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:92px;height:92px;border-radius:50%;
    background:var(--gold);display:grid;place-items:center;
    box-shadow:0 20px 50px -10px rgba(230,178,0,.6);
    transition:transform .3s;
  }
  .video-box:hover .video-play{transform:translate(-50%,-50%) scale(1.08)}
  .video-play::after{
    content:"";display:block;width:0;height:0;margin-left:6px;
    border:18px solid transparent;border-left:28px solid #1a1200;
  }
  .video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

  /* TESTIMONIAL SLIDER */
  .t-slider{position:relative;max-width:880px;margin:0 auto;overflow:hidden}
  .t-track{display:flex;transition:transform .6s cubic-bezier(.2,.8,.2,1);will-change:transform}
  .t-slide{flex:0 0 100%;padding:0 8px;box-sizing:border-box}
  .t-card{
    text-align:center;padding:10px;
  }
  .t-avatar{
    width:96px;height:96px;border-radius:50%;margin:0 auto 24px;
    border:3px solid var(--gold);object-fit:cover;display:block;
    box-shadow:0 10px 30px -10px rgba(230,178,0,.4);
  }
  .t-avatar-placeholder{
    width:96px;height:96px;border-radius:50%;margin:0 auto 24px;
    border:3px solid var(--gold);display:grid;place-items:center;
    background:linear-gradient(180deg,var(--ink-2),var(--ink-3));
    font-family:var(--font);font-weight:700;font-size:34px;color:var(--gold);
  }
  .t-card blockquote{
    margin:0;font-size:clamp(18px,2.2vw,24px);font-weight:500;letter-spacing:-.01em;line-height:1.45;
    max-width:760px;margin-inline:auto;
  }
  .t-card .author{display:block;margin-top:28px;font-size:13px;color:var(--mute);letter-spacing:.15em;text-transform:uppercase;font-weight:600}
  .t-dots{display:flex;gap:4px;justify-content:center;margin-top:36px}
  .t-dot{
    width:52px;height:28px;padding:12px 10px;box-sizing:content-box;
    background:transparent;border:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .t-dot::before{
    content:"";display:block;width:32px;height:4px;border-radius:2px;
    background:var(--line);transition:background .3s,width .3s;
  }
  .t-dot.active::before{background:var(--gold);width:48px}

  /* TESTIMONIAL */
  .testimonial{padding:100px 0}
  .testimonial blockquote{
    max-width:880px;margin:0 auto;text-align:center;
    font-size:clamp(24px,3vw,36px);font-weight:500;letter-spacing:-.015em;line-height:1.3;
  }
  .testimonial .author{display:block;margin-top:36px;font-size:14px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase}
  .stars{display:flex;gap:4px;justify-content:center;margin-bottom:28px;color:var(--gold)}

  /* FAQ */
  .faq-list{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  details{
    border:1px solid var(--line);border-radius:14px;padding:4px 24px;
    background:rgba(255,255,255,.02);transition:border-color .3s;
  }
  details[open]{border-color:rgba(230,178,0,.4)}
  summary{
    list-style:none;cursor:pointer;padding:20px 0;
    display:flex;justify-content:space-between;align-items:center;gap:20px;
    font-size:17px;font-weight:600;
  }
  summary::-webkit-details-marker{display:none}
  summary::after{
    content:"";width:12px;height:12px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);
    transform:rotate(45deg);transition:transform .3s;flex:0 0 12px;
  }
  details[open] summary::after{transform:rotate(-135deg)}
  details p{padding:0 0 22px;color:var(--mute);font-size:15px;line-height:1.6}

  /* CTA */
  .cta-block{
    position:relative;padding:clamp(60px,8vw,100px) clamp(30px,6vw,80px);
    border-radius:28px;overflow:hidden;
    background:linear-gradient(135deg,#0b2f55 0%,#1d5f9f 50%,#0b2f55 100%);
    border:1px solid rgba(106,180,240,.25);
  }
  .cta-block::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(60% 80% at 80% 20%,rgba(230,178,0,.25),transparent 60%);
  }
  .cta-block *{position:relative}
  .cta-block h2{max-width:680px;margin-bottom:20px}
  .cta-block p{color:rgba(233,238,247,.8);max-width:560px;margin-bottom:36px;font-size:17px}

  /* FOOTER */
  footer{padding:60px 0 40px;border-top:1px solid var(--line);margin-top:40px}
  .foot{display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;align-items:center}
  .foot p{color:var(--mute);font-size:13px}
  .foot nav{display:flex;gap:28px}
  .foot a{color:var(--mute);font-size:13px;transition:color .2s}
  .foot a:hover{color:var(--gold)}

  /* reveal */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}
</style>
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a href="#top" class="brand"><span class="v">Volt</span><span class="k">Kompass</span></a>
    <ul id="navLinks"></ul>
    <div style="display:flex;align-items:center">
      <div class="lang-switch">
        <button data-lang="de" class="active">DE</button>
        <button data-lang="ru">RU</button>
      </div>

            <stop offset="0%" stop-color="#fff"/>

          </linearGradient>
        </defs>
        <path d="M 265 80
                 L 210 250
                 L 255 250
                 L 225 420
                 L 310 225

              fill="url(#boltG)" stroke="url(#boltEdge)" stroke-width="3" stroke-linejoin="round"/>

<footer>
  <div class="wrap foot">

<script>
  const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4L19 7"/></svg>';

  const AREA_ICONS = [
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17h2l1-5h12l1 5h2M5 12V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1"/><path d="M3 10h18M3 14h18M9 5v14M15 5v14"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 8 5 11 5 15a7 7 0 0 0 14 0c0-4-3-7-7-13z"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c.5 3-2 4-2 7a2 2 0 0 0 4 0c0-1-.5-1.5-.5-2.5 1.5 1 3.5 3 3.5 6a5 5 0 0 1-10 0c0-3 2-5 3-7 .8-1.6 1.5-2.5 2-3.5z"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>'
  ];

  const BADGE = { de: 'Empfohlen', ru: 'Рекомендуем' };

  function getLang() {
    const params = new URLSearchParams(window.location.search);
    return params.get('lang') || localStorage.getItem('vk-lang') || 'de';
  }

  function setLang(lang) {
    localStorage.setItem('vk-lang', lang);
    const url = new URL(window.location);
    url.searchParams.set('lang', lang);
    window.history.replaceState({}, '', url);
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-switch button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    loadContent(lang);
  }

  async function loadContent(lang) {
    const res = await fetch(`content/${lang}.json`);
    const d = await res.json();
    render(d, lang);
  }

  function render(d, lang) {
    document.title = d.meta.title;
    document.querySelector('meta[name="description"]').content = d.meta.description;

    // Nav
    const navUl = document.getElementById('navLinks');
    navUl.innerHTML = d.nav.links.map(l => `<li><a href="${l.href}">${l.text}</a></li>`).join('');
    document.getElementById('navCta').textContent = d.nav.cta;

    // Hero
    document.getElementById('heroEyebrow').textContent = d.hero.eyebrow;
    document.getElementById('heroClaim').innerHTML = d.hero.claim;
    document.getElementById('heroCtaPrimary').querySelector('span').textContent = d.hero.ctaPrimary;
    document.getElementById('heroCtaSecondary').textContent = d.hero.ctaSecondary;
    document.getElementById('heroMeta').innerHTML = d.hero.stats.map(s =>
      `<div><b>${s.value}</b><span>${s.label}</span></div>`
    ).join('');

    // Problem
    document.getElementById('problemEyebrow').textContent = d.problem.eyebrow;
    document.getElementById('problemHeading').innerHTML = d.problem.heading;
    document.getElementById('problemSubtext').textContent = d.problem.subtext;
    document.getElementById('problemGrid').innerHTML = d.problem.cards.map(c =>
      `<div class="pain reveal"><div class="num">${c.num}</div><h3>${c.title}</h3><p>${c.text}</p></div>`
    ).join('');

    // Fachbereiche
    document.getElementById('fbEyebrow').textContent = d.fachbereiche.eyebrow;
    document.getElementById('fbHeading').innerHTML = d.fachbereiche.heading;
    document.getElementById('fbSubtext').textContent = d.fachbereiche.subtext;
    document.getElementById('fbAreas').innerHTML = d.fachbereiche.areas.map((a, i) =>
      `<div class="area reveal"><div class="ico">${AREA_ICONS[i] || ''}</div><h3>${a.title}</h3><p>${a.text}</p></div>`
    ).join('');

    // Ablauf
    document.getElementById('ablaufEyebrow').textContent = d.ablauf.eyebrow;
    document.getElementById('ablaufHeading').innerHTML = d.ablauf.heading;
    document.getElementById('ablaufSubtext').textContent = d.ablauf.subtext;
    document.getElementById('ablaufSteps').innerHTML = d.ablauf.steps.map((s, i) =>
      `<div class="step reveal"><div class="n">${i + 1}</div><h3>${s.title}</h3><p>${s.text}</p></div>`
    ).join('');

    // Preise
    document.getElementById('preiseEyebrow').textContent = d.preise.eyebrow;
    document.getElementById('preiseHeading').innerHTML = d.preise.heading;
    document.getElementById('preiseSubtext').textContent = d.preise.subtext;
    document.getElementById('preisePlans').innerHTML = d.preise.plans.map(p => {
      const cls = p.featured ? 'plan featured reveal' : 'plan reveal';
      const badge = p.featured ? ` data-badge="${BADGE[lang]}"` : '';
      return `<div class="${cls}"${badge}>
        <h3>${p.name}</h3>
        <div class="price"><b>${p.price}</b><span>${p.unit}</span></div>
        <p class="sub">${p.subtitle}</p>
        <ul>${p.features.map(f => `<li>${CHECK_SVG}${f}</li>`).join('')}</ul>
        <a href="#kontakt" class="btn ${p.featured ? 'btn-primary' : 'btn-ghost'}">${p.cta}</a>
      </div>`;
    }).join('');

    // About
    document.getElementById('aboutEyebrow').textContent = d.about.eyebrow;
    document.getElementById('aboutHeading').innerHTML = d.about.heading;
    document.getElementById('aboutParagraphs').innerHTML = d.about.paragraphs.map(p => `<p>${p}</p>`).join('');
    document.getElementById('aboutStats').innerHTML = d.about.stats.map(s =>
      `<div class="stat"><b>${s.value}</b><span>${s.label}</span></div>`
    ).join('');
    const aboutFig = document.getElementById('aboutVisual');
    aboutFig.querySelector('img').src = d.about.image;
    aboutFig.querySelector('img').alt = d.about.imageAlt;
    aboutFig.querySelector('figcaption b').textContent = d.about.captionName;
    aboutFig.querySelector('figcaption span').textContent = d.about.captionSub;

    // Video
    document.getElementById('videoEyebrow').textContent = d.video.eyebrow;
    document.getElementById('videoHeading').innerHTML = d.video.heading;
    document.getElementById('videoSubtext').textContent = d.video.subtext;
    const vBox = document.getElementById('videoBox');
    vBox.dataset.id = d.video.youtubeId;
    const vImg = vBox.querySelector('img');
    if (vImg) {
      vImg.src = `https://i.ytimg.com/vi/${d.video.youtubeId}/hqdefault.jpg`;
      vImg.alt = d.video.videoAlt;
    }

    // Testimonials
    document.getElementById('testEyebrow').textContent = d.testimonials.eyebrow;
    document.getElementById('testHeading').innerHTML = d.testimonials.heading;
    document.getElementById('testSubtext').textContent = d.testimonials.subtext;
    document.getElementById('tTrack').innerHTML = d.testimonials.items.map(t => {
      const avatar = t.avatar
        ? `<img class="t-avatar" src="${t.avatar}" alt="${t.name}" loading="lazy" decoding="async"/>`
        : `<div class="t-avatar-placeholder">${t.name.charAt(0)}</div>`;
      return `<div class="t-slide"><div class="t-card">${avatar}<blockquote>\u201E${t.quote}\u201C</blockquote><span class="author">\u2014 ${t.name}</span></div></div>`;
    }).join('');
    document.getElementById('tDots').innerHTML = d.testimonials.items.map((_, i) =>
      `<div class="t-dot${i === 0 ? ' active' : ''}" data-i="${i}"></div>`
    ).join('');

    // FAQ
    document.getElementById('faqEyebrow').textContent = d.faq.eyebrow;
    document.getElementById('faqHeading').innerHTML = d.faq.heading;
    document.getElementById('faqSubtext').textContent = d.faq.subtext;
    document.getElementById('faqList').innerHTML = d.faq.items.map((f, i) =>
      `<details class="reveal"${i === 0 ? ' open' : ''}><summary>${f.question}</summary><p>${f.answer}</p></details>`
    ).join('');

    // CTA
    document.getElementById('ctaEyebrow').textContent = d.cta.eyebrow;
    document.getElementById('ctaHeading').innerHTML = d.cta.heading;
    document.getElementById('ctaText').textContent = d.cta.text;
    document.getElementById('ctaPrimary').href = `mailto:${d.cta.email}`;
    document.getElementById('ctaPrimary').querySelector('span').textContent = d.cta.ctaPrimary;
    document.getElementById('ctaSecondary').textContent = d.cta.ctaSecondary;

    // Footer
    document.getElementById('footCopyright').textContent = d.footer.copyright;
    document.getElementById('footNav').innerHTML = d.footer.links.map(l =>
      `<a href="${l.href}">${l.text}</a>`
    ).join('');

    // Re-init reveal observers for dynamically added elements
    initReveal();
    initSlider();
  }

  // Reveal on scroll
  let revealObserver;
  function initReveal() {
    if (revealObserver) revealObserver.disconnect();
    revealObserver = new IntersectionObserver((es) => {
      es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); revealObserver.unobserve(e.target); } });
    }, { threshold: .12, rootMargin: "0px 0px -60px 0px" });
    document.querySelectorAll('.reveal:not(.in)').forEach(el => revealObserver.observe(el));
  }

  // Testimonial slider
  let sliderTimer;
  function initSlider() {
    if (sliderTimer) clearInterval(sliderTimer);
    const track = document.getElementById('tTrack');
    const dots = [...document.querySelectorAll('#tDots .t-dot')];
    const slider = document.getElementById('tSlider');
    if (!track || !dots.length) return;
    const total = dots.length;
    let i = 0;
    const go = (n) => {
      i = (n + total) % total;
      track.style.transform = `translateX(-${i * 100}%)`;
      dots.forEach((d, k) => d.classList.toggle('active', k === i));
    };
    const start = () => { sliderTimer = setInterval(() => go(i + 1), 10000); };
    const stop = () => clearInterval(sliderTimer);
    dots.forEach(d => d.addEventListener('click', () => { go(+d.dataset.i); stop(); start(); }));
    slider.addEventListener('mouseenter', stop);
    slider.addEventListener('mouseleave', start);
    const vo = new IntersectionObserver(([e]) => e.isIntersecting ? start() : stop(), { threshold: .2 });
    vo.observe(slider);
  }

  // YouTube facade
  function initVideo() {
    const box = document.getElementById('videoBox');
    if (!box) return;
    const load = () => {
      const id = box.dataset.id;
      box.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
    };
    box.addEventListener('click', load);
    box.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); load(); } });
  }

  // Language switch
  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });

  // Init
  const lang = getLang();
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  loadContent(lang);
  initVideo();
</script>
</body>
