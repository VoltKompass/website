<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#17314f"/>
      <stop offset="70%" stop-color="#0b1f38"/>
      <stop offset="100%" stop-color="#07172c"/>
    </radialGradient>
    <linearGradient id="ringG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="50%" stop-color="#e6b200"/>
      <stop offset="100%" stop-color="#7a5c00"/>
    </linearGradient>
    <linearGradient id="ringInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a00"/>
      <stop offset="100%" stop-color="#e6b200"/>
    </linearGradient>
    <pattern id="solar" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#0f2748"/>
      <rect x="1" y="1" width="22" height="22" fill="#143867" stroke="#1d5f9f" stroke-width=".6"/>
      <line x1="12" y1="1" x2="12" y2="23" stroke="#1d5f9f" stroke-width=".4"/>
      <line x1="1" y1="12" x2="23" y2="12" stroke="#1d5f9f" stroke-width=".4"/>
    </pattern>
  </defs>

  <circle cx="250" cy="250" r="240" fill="url(#ringG)"/>
  <circle cx="250" cy="250" r="222" fill="url(#bg)"/>

  <g stroke="#ffe27a" stroke-linecap="round" opacity=".85">
    <g>
      <line x1="250" y1="30" x2="250" y2="43" stroke-width="4"/>
      <line x1="250" y1="457" x2="250" y2="470" stroke-width="4"/>
      <line x1="30" y1="250" x2="43" y2="250" stroke-width="4"/>
      <line x1="457" y1="250" x2="470" y2="250" stroke-width="4"/>
    </g>
    <g opacity=".6">
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(30 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(60 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(120 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(150 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(210 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(240 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(300 250 250)"/>
      <line x1="250" y1="34" x2="250" y2="39" stroke-width="2" transform="rotate(330 250 250)"/>
    </g>
  </g>

  <circle cx="250" cy="250" r="170" fill="url(#solar)" opacity=".55"/>
  <circle cx="250" cy="250" r="170" fill="none" stroke="#e6b200" stroke-width="3" opacity=".6"/>
  <circle cx="250" cy="250" r="170" fill="none" stroke="url(#ringInner)" stroke-width="6" opacity=".35"/>
</svg>
