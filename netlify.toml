[build]
  publish = "."

[[redirects]]
  from = "/blog-stufe-1"
  to = "/blog-stufe-1.html"
  status = 301
  force = true

[[redirects]]
  from = "/blog-stufe-2"
  to = "/blog-stufe-2.html"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301
  force = true

[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 301
  force = true

[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 301
  force = true

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
