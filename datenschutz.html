<script>
  async function loadPrivacyContent() {
    const target = document.getElementById('privacyContent');
    try {
      const response = await fetch('datenschutz-content.html');
      if (!response.ok) throw new Error('Datenschutzinhalt konnte nicht geladen werden.');
      target.innerHTML = await response.text();
    } catch (error) {
      target.innerHTML = '<h2>Datenschutzerklaerung</h2><p>Der Datenschutzinhalt konnte nicht geladen werden. Bitte versuchen Sie es spaeter erneut.</p>';
    }
  }

  loadPrivacyContent();
</script>
